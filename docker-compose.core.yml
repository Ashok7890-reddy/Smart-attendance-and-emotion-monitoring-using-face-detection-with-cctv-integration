version: '3.8'

# Core Services Only - Fast Startup for Testing
services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: smart_attendance_db
    environment:
      POSTGRES_DB: smart_attendance_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - smart_attendance_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: smart_attendance_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - smart_attendance_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Face Recognition Service
  face_recognition_service:
    build:
      context: .
      dockerfile: docker/face-recognition.Dockerfile
    container_name: face_recognition_service
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - DB_HOST=postgres
      - DB_PASSWORD=dev_password
      - REDIS_HOST=redis
      - SERVICE_NAME=face_recognition
      - FACE_RECOGNITION_MODEL_PATH=/app/models/facenet
      - LIVENESS_MODEL_PATH=/app/models/liveness
    volumes:
      - ./backend:/app/backend
      - ./models:/app/models
      - ./logs:/app/logs
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smart_attendance_network
    restart: unless-stopped
    command: ["python", "-m", "uvicorn", "backend.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  # Emotion Analysis Service
  emotion_analysis_service:
    build:
      context: .
      dockerfile: docker/emotion-analysis.Dockerfile
    container_name: emotion_analysis_service
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - DB_HOST=postgres
      - DB_PASSWORD=dev_password
      - REDIS_HOST=redis
      - SERVICE_NAME=emotion_analysis
      - EMOTION_MODEL_PATH=/app/models/emotion_classifier
    volumes:
      - ./backend:/app/backend
      - ./models:/app/models
      - ./logs:/app/logs
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smart_attendance_network
    restart: unless-stopped
    command: ["python", "-m", "uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  # Attendance Management Service
  attendance_service:
    build:
      context: .
      dockerfile: docker/attendance-service.Dockerfile
    container_name: attendance_service
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - DB_HOST=postgres
      - DB_PASSWORD=dev_password
      - REDIS_HOST=redis
      - SERVICE_NAME=attendance_management
      - FACE_RECOGNITION_SERVICE_URL=http://face_recognition_service:8000
      - EMOTION_ANALYSIS_SERVICE_URL=http://emotion_analysis_service:8000
    volumes:
      - ./backend:/app/backend
      - ./logs:/app/logs
    ports:
      - "8003:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      face_recognition_service:
        condition: service_started
      emotion_analysis_service:
        condition: service_started
    networks:
      - smart_attendance_network
    restart: unless-stopped
    command: ["python", "-m", "uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  # API Gateway
  api_gateway:
    build:
      context: .
      dockerfile: docker/attendance-service.Dockerfile
    container_name: api_gateway
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - DB_HOST=postgres
      - DB_PASSWORD=dev_password
      - REDIS_HOST=redis
      - SERVICE_NAME=api_gateway
      - FACE_RECOGNITION_SERVICE_URL=http://face_recognition_service:8000
      - EMOTION_ANALYSIS_SERVICE_URL=http://emotion_analysis_service:8000
      - ATTENDANCE_SERVICE_URL=http://attendance_service:8000
    volumes:
      - ./backend:/app/backend
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      - face_recognition_service
      - emotion_analysis_service
      - attendance_service
    networks:
      - smart_attendance_network
    restart: unless-stopped
    command: ["python", "-m", "uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  # WebSocket Server
  websocket_server:
    build:
      context: .
      dockerfile: docker/websocket-server.Dockerfile
    container_name: websocket_server
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - REDIS_HOST=redis
      - SERVICE_NAME=websocket
    volumes:
      - ./backend:/app/backend
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - smart_attendance_network
    restart: unless-stopped
    command: ["python", "-m", "backend.websocket_server", "--host", "0.0.0.0", "--port", "8080", "--reload"]

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: smart_attendance_frontend
    environment:
      - NODE_ENV=development
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_WS_URL=ws://localhost:8080
    volumes:
      - ./frontend:/app/frontend
    ports:
      - "3000:80"
    depends_on:
      - api_gateway
      - websocket_server
    networks:
      - smart_attendance_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  smart_attendance_network:
    driver: bridge