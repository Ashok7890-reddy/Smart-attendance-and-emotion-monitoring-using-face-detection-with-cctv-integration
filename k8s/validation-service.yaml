apiVersion: apps/v1
kind: Deployment
metadata:
  name: validation-service
  namespace: smart-attendance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: validation-service
  template:
    metadata:
      labels:
        app: validation-service
    spec:
      containers:
      - name: validation-service
        image: smart-attendance/validation-service:latest
        ports:
        - containerPort: 8000
        env:
        - name: SERVICE_NAME
          value: "validation"
        envFrom:
        - configMapRef:
            name: smart-attendance-config
        - secretRef:
            name: smart-attendance-secrets
        volumeMounts:
        - name: logs-storage
          mountPath: /app/logs
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        resources:
          requests:
            memory: "256Mi"
            cpu: "125m"
          limits:
            memory: "512Mi"
            cpu: "250m"
      volumes:
      - name: logs-storage
        persistentVolumeClaim:
          claimName: logs-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: validation-service
  namespace: smart-attendance
spec:
  selector:
    app: validation-service
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP