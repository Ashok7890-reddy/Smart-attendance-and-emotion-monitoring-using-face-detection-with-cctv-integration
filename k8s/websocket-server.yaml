apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket-server
  namespace: smart-attendance
spec:
  replicas: 2
  selector:
    matchLabels:
      app: websocket-server
  template:
    metadata:
      labels:
        app: websocket-server
    spec:
      containers:
      - name: websocket-server
        image: smart-attendance/websocket-server:latest
        ports:
        - containerPort: 8080
        env:
        - name: SERVICE_NAME
          value: "websocket"
        envFrom:
        - configMapRef:
            name: smart-attendance-config
        - secretRef:
            name: smart-attendance-secrets
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
        resources:
          requests:
            memory: "128Mi"
            cpu: "125m"
          limits:
            memory: "256Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: websocket-service
  namespace: smart-attendance
spec:
  selector:
    app: websocket-server
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP