global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Smart Attendance System Services
  - job_name: 'face-recognition-service'
    static_configs:
      - targets: ['face_recognition_service:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'emotion-analysis-service'
    static_configs:
      - targets: ['emotion_analysis_service:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'attendance-service'
    static_configs:
      - targets: ['attendance_service:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'validation-service'
    static_configs:
      - targets: ['validation_service:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api_gateway:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'websocket-server'
    static_configs:
      - targets: ['websocket_server:8080']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Infrastructure Services
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis_exporter:9121']

  # Node Exporter for system metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node_exporter:9100']

  # cAdvisor for container metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    metrics_path: '/metrics'