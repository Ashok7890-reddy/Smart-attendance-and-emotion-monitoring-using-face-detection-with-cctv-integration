groups:
  - name: smart_attendance_alerts
    rules:
      # Service Health Alerts
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "Service {{ $labels.job }} has been down for more than 1 minute."

      # Face Recognition Service Alerts
      - alert: FaceRecognitionHighLatency
        expr: histogram_quantile(0.95, rate(face_recognition_processing_duration_seconds_bucket[5m])) > 2
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Face recognition processing latency is high"
          description: "95th percentile latency is {{ $value }}s, exceeding 2s threshold."

      - alert: FaceRecognitionLowAccuracy
        expr: face_recognition_accuracy_percentage < 95
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Face recognition accuracy is below threshold"
          description: "Face recognition accuracy is {{ $value }}%, below 95% threshold."

      # Attendance Service Alerts
      - alert: AttendanceValidationFailures
        expr: rate(attendance_validation_failures_total[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High attendance validation failure rate"
          description: "Attendance validation failure rate is {{ $value }} per second."

      # System Resource Alerts
      - alert: HighMemoryUsage
        expr: (container_memory_usage_bytes / container_spec_memory_limit_bytes) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage for container {{ $labels.name }}"
          description: "Memory usage is {{ $value }}% for container {{ $labels.name }}."

      - alert: HighCPUUsage
        expr: rate(container_cpu_usage_seconds_total[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage for container {{ $labels.name }}"
          description: "CPU usage is {{ $value }}% for container {{ $labels.name }}."

      # Database Alerts
      - alert: PostgreSQLDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL database has been down for more than 1 minute."

      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis cache has been down for more than 1 minute."

      # Camera Connectivity Alerts
      - alert: CameraConnectivityLoss
        expr: camera_connectivity_status == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Camera connectivity lost"
          description: "Camera {{ $labels.camera_location }} has lost connectivity."

      # Emotion Analysis Alerts
      - alert: EmotionAnalysisHighLatency
        expr: histogram_quantile(0.95, rate(emotion_analysis_processing_duration_seconds_bucket[5m])) > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Emotion analysis processing latency is high"
          description: "95th percentile latency is {{ $value }}s, exceeding 5s threshold."