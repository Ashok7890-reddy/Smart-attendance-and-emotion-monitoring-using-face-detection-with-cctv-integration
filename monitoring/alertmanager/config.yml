global:
  smtp_smarthost: 'localhost:587'
  smtp_from: 'alerts@smartattendance.local'
  smtp_auth_username: 'alerts@smartattendance.local'
  smtp_auth_password: 'password'

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'web.hook'
  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
    - match:
        severity: warning
      receiver: 'warning-alerts'

receivers:
  - name: 'web.hook'
    webhook_configs:
      - url: 'http://localhost:5001/webhook'

  - name: 'critical-alerts'
    email_configs:
      - to: 'admin@smartattendance.local'
        subject: 'CRITICAL: Smart Attendance System Alert'
        body: |
          Alert: {{ .GroupLabels.alertname }}
          Summary: {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}
          Description: {{ range .Alerts }}{{ .Annotations.description }}{{ end }}
          
          Service: {{ .GroupLabels.job }}
          Severity: {{ .GroupLabels.severity }}
          
          Time: {{ range .Alerts }}{{ .StartsAt }}{{ end }}
    slack_configs:
      - api_url: 'YOUR_SLACK_WEBHOOK_URL'
        channel: '#critical-alerts'
        title: 'Smart Attendance System - Critical Alert'
        text: |
          *Alert:* {{ .GroupLabels.alertname }}
          *Summary:* {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}
          *Service:* {{ .GroupLabels.job }}
          *Severity:* {{ .GroupLabels.severity }}

  - name: 'warning-alerts'
    email_configs:
      - to: 'support@smartattendance.local'
        subject: 'WARNING: Smart Attendance System Alert'
        body: |
          Alert: {{ .GroupLabels.alertname }}
          Summary: {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}
          Description: {{ range .Alerts }}{{ .Annotations.description }}{{ end }}
          
          Service: {{ .GroupLabels.job }}
          Severity: {{ .GroupLabels.severity }}
          
          Time: {{ range .Alerts }}{{ .StartsAt }}{{ end }}

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'dev', 'instance']