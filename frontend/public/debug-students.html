<!DOCTYPE html>
<html>
<head>
    <title>Debug Students Data</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .student { border: 1px solid #ccc; margin: 10px 0; padding: 15px; border-radius: 5px; }
        .descriptor { font-family: monospace; font-size: 12px; color: #666; word-break: break-all; }
        button { padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .stats { background: #f8f9fa; padding: 15px; border-radius: 5px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>🔍 Debug Students Data</h1>
    
    <div class="stats">
        <h3>Quick Stats</h3>
        <p id="stats">Loading...</p>
    </div>
    
    <button onclick="loadStudents()">🔄 Reload Students</button>
    <button onclick="clearStudents()">🗑️ Clear All Students</button>
    <button onclick="exportStudents()">📥 Export Students</button>
    
    <div id="students-container">
        <p>Click "Reload Students" to see registered students...</p>
    </div>

    <script>
        function loadStudents() {
            const students = JSON.parse(localStorage.getItem('students') || '[]');
            const container = document.getElementById('students-container');
            const stats = document.getElementById('stats');
            
            if (students.length === 0) {
                container.innerHTML = '<p style="color: red;">❌ No students registered!</p>';
                stats.innerHTML = 'No students found in localStorage';
                return;
            }
            
            stats.innerHTML = `
                <strong>Total Students:</strong> ${students.length}<br>
                <strong>Storage Size:</strong> ${JSON.stringify(students).length} characters<br>
                <strong>Last Updated:</strong> ${new Date().toLocaleString()}
            `;
            
            let html = '<h2>📋 Registered Students</h2>';
            
            students.forEach((student, index) => {
                const descriptorLength = student.face_descriptor ? student.face_descriptor.length : 0;
                const descriptorPreview = student.face_descriptor ? 
                    student.face_descriptor.slice(0, 10).map(n => n.toFixed(3)).join(', ') + '...' : 
                    'No descriptor';
                
                html += `
                    <div class="student">
                        <h3>👤 ${student.name || 'Unknown'}</h3>
                        <p><strong>ID:</strong> ${student.student_id || 'No ID'}</p>
                        <p><strong>Type:</strong> ${student.student_type || 'Unknown'}</p>
                        <p><strong>Email:</strong> ${student.email || 'No email'}</p>
                        <p><strong>Phone:</strong> ${student.phone || 'No phone'}</p>
                        <p><strong>Face Descriptor:</strong> ${descriptorLength} dimensions</p>
                        <div class="descriptor">
                            <strong>Preview:</strong> [${descriptorPreview}]
                        </div>
                        <button onclick="deleteStudent(${index})">🗑️ Delete</button>
                        <button onclick="testStudent(${index})">🧪 Test Recognition</button>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        function clearStudents() {
            if (confirm('Are you sure you want to delete ALL students? This cannot be undone!')) {
                localStorage.removeItem('students');
                loadStudents();
                alert('✅ All students deleted!');
            }
        }
        
        function deleteStudent(index) {
            const students = JSON.parse(localStorage.getItem('students') || '[]');
            const student = students[index];
            
            if (confirm(`Delete student "${student.name}"?`)) {
                students.splice(index, 1);
                localStorage.setItem('students', JSON.stringify(students));
                loadStudents();
                alert(`✅ Student "${student.name}" deleted!`);
            }
        }
        
        function exportStudents() {
            const students = JSON.parse(localStorage.getItem('students') || '[]');
            const dataStr = JSON.stringify(students, null, 2);
            const dataBlob = new Blob([dataStr], {type: 'application/json'});
            
            const link = document.createElement('a');
            link.href = URL.createObjectURL(dataBlob);
            link.download = `students-backup-${new Date().toISOString().split('T')[0]}.json`;
            link.click();
        }
        
        function testStudent(index) {
            const students = JSON.parse(localStorage.getItem('students') || '[]');
            const student = students[index];
            
            if (!student.face_descriptor) {
                alert('❌ No face descriptor found for this student!');
                return;
            }
            
            // Test descriptor validity
            const descriptor = new Float32Array(student.face_descriptor);
            const isValid = descriptor.length === 128 && !descriptor.every(val => val === 0);
            
            alert(`🧪 Test Results for ${student.name}:
            
✅ Descriptor Length: ${descriptor.length} (should be 128)
${isValid ? '✅' : '❌'} Descriptor Valid: ${isValid}
📊 Sample Values: [${descriptor.slice(0, 5).map(n => n.toFixed(3)).join(', ')}...]
            
${isValid ? 'This student should be recognizable!' : 'This student may have recognition issues!'}`);
        }
        
        // Auto-load on page load
        window.onload = loadStudents;
    </script>
</body>
</html>
