# Input sources
<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

# Docker container logs
<source>
  @type tail
  path /var/lib/docker/containers/*/*.log
  pos_file /fluentd/log/containers.log.pos
  tag docker.*
  format json
  read_from_head true
</source>

# Smart Attendance System application logs
<source>
  @type tail
  path /app/logs/*.log
  pos_file /fluentd/log/app.log.pos
  tag smart_attendance.*
  format multiline
  format_firstline /^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}/
  format1 /^(?<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}) \[(?<level>\w+)\] (?<service>\w+): (?<message>.*)/
  multiline_flush_interval 5s
</source>

# Face recognition service specific logs
<filter smart_attendance.face_recognition>
  @type record_transformer
  <record>
    service_type face_recognition
    log_type application
  </record>
</filter>

# Emotion analysis service specific logs
<filter smart_attendance.emotion_analysis>
  @type record_transformer
  <record>
    service_type emotion_analysis
    log_type application
  </record>
</filter>

# Attendance service specific logs
<filter smart_attendance.attendance>
  @type record_transformer
  <record>
    service_type attendance_management
    log_type application
  </record>
</filter>

# Validation service specific logs
<filter smart_attendance.validation>
  @type record_transformer
  <record>
    service_type validation
    log_type application
  </record>
</filter>

# Security and audit logs
<filter smart_attendance.**>
  @type grep
  <regexp>
    key message
    pattern (authentication|authorization|biometric|face_embedding|security)
  </regexp>
  @type record_transformer
  <record>
    log_category security_audit
  </record>
</filter>

# Performance monitoring logs
<filter smart_attendance.**>
  @type grep
  <regexp>
    key message
    pattern (processing_time|latency|performance|response_time)
  </regexp>
  @type record_transformer
  <record>
    log_category performance
  </record>
</filter>

# Error logs
<filter smart_attendance.**>
  @type grep
  <regexp>
    key level
    pattern (ERROR|CRITICAL|FATAL)
  </regexp>
  @type record_transformer
  <record>
    log_category error
    alert_required true
  </record>
</filter>

# Output to Elasticsearch for log aggregation and search
<match smart_attendance.**>
  @type elasticsearch
  host elasticsearch
  port 9200
  index_name smart-attendance-logs
  type_name _doc
  logstash_format true
  logstash_prefix smart-attendance
  logstash_dateformat %Y.%m.%d
  include_tag_key true
  tag_key @log_name
  flush_interval 10s
  <buffer>
    @type file
    path /fluentd/log/buffer/elasticsearch
    flush_mode interval
    flush_interval 10s
    chunk_limit_size 8MB
    queue_limit_length 32
    retry_max_interval 30
    retry_forever true
  </buffer>
</match>

# Output Docker container logs to separate index
<match docker.**>
  @type elasticsearch
  host elasticsearch
  port 9200
  index_name docker-logs
  type_name _doc
  logstash_format true
  logstash_prefix docker
  logstash_dateformat %Y.%m.%d
  include_tag_key true
  tag_key @log_name
  flush_interval 30s
  <buffer>
    @type file
    path /fluentd/log/buffer/docker
    flush_mode interval
    flush_interval 30s
    chunk_limit_size 8MB
    queue_limit_length 16
  </buffer>
</match>

# Backup output to file for critical logs
<match smart_attendance.**>
  @type copy
  <store>
    @type file
    path /fluentd/log/backup/smart-attendance.%Y%m%d
    time_slice_format %Y%m%d
    time_slice_wait 10m
    compress gzip
    format json
  </store>
</match>